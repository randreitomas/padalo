[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "padalo-forecasting"
version = "0.1.0"
description = "Standalone Prophet forecasting engine for Padalo FXPilot."
requires-python = ">=3.11"
dependencies = [
  "cmdstanpy==1.2.5",
  "matplotlib==3.9.2",
  "numpy==1.26.4",
  "pandas==2.2.3",
  "prophet==1.1.7",
]

[project.scripts]
padalo-fxpilot-generate = "padalo_forecasting.dataset.generator:main"
padalo-fxpilot-evaluate = "padalo_forecasting.evaluation.backtest:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.setuptools.packages.find]
where = ["src"]
