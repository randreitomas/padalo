[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "padalo-agent"
version = "0.1.0"
description = "Isolated OpenAI Responses API runtime for Padalo."
requires-python = ">=3.11"
dependencies = [
  "openai==2.45.0",
  "pydantic>=2.6,<3",
]

[tool.setuptools.packages.find]
where = ["src"]
