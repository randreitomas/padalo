services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    command: npm run dev --workspace @padalo/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    env_file:
      - apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://padalo:padalo@postgres:5432/padalo
      BACKEND_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: padalo
      POSTGRES_USER: padalo
      POSTGRES_PASSWORD: padalo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
